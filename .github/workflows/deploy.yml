# .github/workflows/deploy.yml
# 每次 push markdown → 自动转换为 HTML → 部署到 GitHub Pages

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "*.md"
      - "*.ts"
      - "package.json"
      - "bun.lock"
  workflow_dispatch: # 手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Convert all markdown files
        run: |
          for md in *.md; do
            [ "$md" = "README.md" ] && continue
            echo "📄 Converting: $md"
            bun main.ts "$md" --theme premium --color blue 2>&1 || true
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
